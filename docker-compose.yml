version: "3.9"

services:
  message-broker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: message-broker
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    deploy:
      resources:
        limits:
          memory: 512m